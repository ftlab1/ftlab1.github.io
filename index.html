<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数钥智评 —— 专家级数据资产评估平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --primary: #2563eb; --expert-accent: #8b5cf6; }
        body { font-family: 'Inter', "Microsoft YaHei", sans-serif; background: #f1f5f9; }
        .sidebar-active { background: #eff6ff; color: var(--primary); border-right: 4px solid var(--primary); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .chat-bubble-ai { border-radius: 4px 16px 16px 16px; background: white; border: 1px solid #e2e8f0; }
        .chat-bubble-user { border-radius: 16px 16px 4px 16px; background: var(--primary); color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen overflow-hidden">

<div id="app" class="flex flex-col h-full">
    <nav class="h-16 glass border-b px-6 flex justify-between items-center z-50">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="location.reload()">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">数</div>
            <span class="text-xl font-black text-slate-800 tracking-tighter">数钥智评 <span class="text-blue-600 text-xs font-normal ml-1">v0.2 Enterprise</span></span>
        </div>
        <div class="flex items-center space-x-6">
            <div id="status-tag" class="hidden px-3 py-1 rounded-full text-xs font-bold bg-slate-100 text-slate-500">未登录模式</div>
            <button id="main-action-btn" onclick="openLogin()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-md hover:bg-blue-700 transition">立即登录</button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="hidden w-64 bg-white border-r flex flex-col transition-all duration-300">
            <div id="sidebar-content" class="flex-1 p-4 space-y-1 overflow-y-auto no-scrollbar">
                </div>
            <div class="p-6 border-t bg-slate-50">
                <div class="flex items-center space-x-3">
                    <div id="avatar-box" class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">U</div>
                    <div class="overflow-hidden">
                        <p id="profile-name" class="font-bold text-sm text-slate-800 truncate">访客</p>
                        <p id="profile-role" class="text-[10px] text-slate-400">标准版权限</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 relative overflow-y-auto bg-slate-50 p-8">
            <div id="view-welcome" class="max-w-4xl mx-auto py-20 animate__animated animate__fadeIn">
                <div class="inline-block px-4 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-bold mb-6 italic">让数据价值可衡量、可信赖</div>
                <h1 class="text-6xl font-black text-slate-900 leading-tight mb-8">
                    数钥智评：<br><span class="text-blue-600 underline decoration-blue-200">极限生存估值</span><br>引领数据资产新合规
                </h1>
                <p class="text-xl text-slate-500 mb-10 max-w-2xl leading-relaxed">
                    不仅是一份估值，更是风控的最后一道防线。我们通过 AI 智能体模拟多方博弈，为您计算出最真实的资产底线。
                </p>
                <div class="flex space-x-4">
                    <button onclick="openLogin()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold text-lg shadow-xl shadow-blue-200">开始您的资产评估</button>
                    <button class="bg-white border px-8 py-4 rounded-2xl font-bold text-lg text-slate-600 hover:bg-slate-50 transition">查阅技术白皮书</button>
                </div>
            </div>

            <div id="dynamic-content" class="hidden animate__animated animate__fadeIn"></div>
        </main>
    </div>

    <div id="login-overlay" class="hidden fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-10 shadow-2xl relative animate__animated animate__zoomIn">
            <button onclick="closeLogin()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-600 text-xl">✕</button>
            <div class="text-center mb-10">
                <h3 class="text-2xl font-black text-slate-800">欢迎回归</h3>
                <p class="text-slate-500 text-sm mt-2">请选择登录的角色以进入对应的系统</p>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div onclick="selectLogin('user')" id="btn-user-select" class="cursor-pointer group p-6 border-2 border-blue-600 bg-blue-50 rounded-2xl text-center transition">
                    <div class="text-3xl mb-2">🏢</div>
                    <div class="font-bold text-blue-600">企业/银行端</div>
                </div>
                <div onclick="selectLogin('expert')" id="btn-expert-select" class="cursor-pointer group p-6 border-2 border-slate-100 rounded-2xl text-center hover:bg-slate-50 transition">
                    <div class="text-3xl mb-2">👨‍🏫</div>
                    <div class="font-bold text-slate-600">行业专家端</div>
                </div>
            </div>
            <button onclick="executeLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-blue-700 transition">进入工作台</button>
        </div>
    </div>

    <div id="ai-assistant" class="hidden fixed bottom-6 right-6 w-[420px] h-[650px] bg-white rounded-3xl shadow-2xl border border-blue-100 flex flex-col z-[200] animate__animated animate__slideInUp overflow-hidden">
        <div class="bg-blue-600 p-5 text-white flex justify-between items-center shadow-md">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center animate-pulse text-lg">🤖</div>
                <div>
                    <p class="font-bold text-sm">AI 资产采集助手</p>
                    <p class="text-[10px] opacity-70">正在分析您的资产潜力...</p>
                </div>
            </div>
            <button onclick="toggleAi(false)" class="text-xl opacity-60 hover:opacity-100 transition">✕</button>
        </div>
        
        <div class="px-5 py-2 bg-blue-50 border-b border-blue-100 flex justify-between items-center">
            <span class="text-[10px] text-blue-600 font-bold uppercase tracking-wider">采集进度: <span id="chat-progress-num">1/5</span></span>
            <div class="w-32 h-1 bg-blue-100 rounded-full overflow-hidden">
                <div id="chat-progress-bar" class="h-full bg-blue-600 transition-all duration-500" style="width: 20%"></div>
            </div>
        </div>

        <div id="chat-window" class="flex-1 overflow-y-auto p-5 space-y-4 no-scrollbar bg-slate-50/30">
            <div class="flex items-start space-x-2">
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-xs">A</div>
                <div class="chat-bubble-ai p-4 text-sm text-slate-700 leading-relaxed shadow-sm max-w-[85%]">
                    您好！我是您的数据资产评估助手。为了开始<strong>极限生存估值</strong>，请先上传您的资产说明文档（Excel或PDF），或者直接告诉我您的数据资产主要包含哪些内容？
                </div>
            </div>
        </div>

        <div class="p-4 bg-white border-t space-y-4">
            <div id="ai-options" class="flex flex-wrap gap-2">
                <label class="px-4 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold cursor-pointer hover:scale-105 transition shadow-sm">
                    📎 上传资产文件
                    <input type="file" class="hidden" onchange="handleFileSubmit(event)">
                </label>
                <button onclick="sendUserMessage('仅手动录入', 1)" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl text-xs font-bold hover:bg-slate-200 transition">手动录入</button>
            </div>
            <div class="flex space-x-2">
                <input id="chat-input" type="text" placeholder="回复AI助手..." class="flex-1 px-4 py-3 bg-slate-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="handleTextSubmit()" class="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center font-bold">↑</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentRole = 'user'; 
    let step = 1;

    // 1. 登录控制
    function openLogin() { document.getElementById('login-overlay').classList.remove('hidden'); }
    function closeLogin() { document.getElementById('login-overlay').classList.add('hidden'); }

    function selectLogin(role) {
        currentRole = role;
        document.getElementById('btn-user-select').className = role === 'user' ? "cursor-pointer group p-6 border-2 border-blue-600 bg-blue-50 rounded-2xl text-center transition" : "cursor-pointer group p-6 border-2 border-slate-100 rounded-2xl text-center hover:bg-slate-50 transition";
        document.getElementById('btn-expert-select').className = role === 'expert' ? "cursor-pointer group p-6 border-2 border-blue-600 bg-blue-50 rounded-2xl text-center transition" : "cursor-pointer group p-6 border-2 border-slate-100 rounded-2xl text-center hover:bg-slate-50 transition";
    }

    function executeLogin() {
        closeLogin();
        document.getElementById('view-welcome').classList.add('hidden');
        document.getElementById('sidebar').classList.remove('hidden');
        document.getElementById('dynamic-content').classList.remove('hidden');
        document.getElementById('main-action-btn').innerText = "退出系统";
        document.getElementById('status-tag').classList.remove('hidden');
        
        if(currentRole === 'user') {
            document.getElementById('profile-name').innerText = "某城商行资管部";
            document.getElementById('profile-role').innerText = "PRO 企业端";
            document.getElementById('status-tag').innerText = "企业/银行模式";
            renderUserSidebar();
            loadView('dashboard');
        } else {
            document.getElementById('profile-name').innerText = "张德海 教授";
            document.getElementById('profile-role').innerText = "资深风险专家";
            document.getElementById('status-tag').innerText = "专家工作模式";
            renderExpertSidebar();
            loadView('expertTasks');
        }
    }

    // 2. 侧边栏逻辑
    function renderUserSidebar() {
        const menu = [
            { id: 'dashboard', icon: '📊', label: '工作台首页' },
            { id: 'assess', icon: '🚀', label: '资产评估发起' },
            { id: 'reports', icon: '📑', label: '报告中心' },
            { id: 'mall', icon: '🛍️', label: '增值服务商城' },
            { id: 'settings', icon: '⚙️', label: '账户与合规' }
        ];
        injectMenu(menu);
    }

    function renderExpertSidebar() {
        const menu = [
            { id: 'expertTasks', icon: '📥', label: '待审核任务' },
            { id: 'expertHistory', icon: '✅', label: '已完成审核' },
            { id: 'earnings', icon: '💰', label: '收益明细' }
        ];
        injectMenu(menu);
    }

    function injectMenu(items) {
        const container = document.getElementById('sidebar-content');
        container.innerHTML = '';
        items.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = `sidebar-item flex items-center space-x-3 p-4 rounded-xl cursor-pointer ${idx===0?'sidebar-active':''}`;
            div.innerHTML = `<span>${item.icon}</span><span class="font-bold text-sm">${item.label}</span>`;
            div.onclick = () => {
                document.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('sidebar-active'));
                div.classList.add('sidebar-active');
                loadView(item.id);
            };
            container.appendChild(div);
        });
    }

    // 3. 动态内容加载器 (扩展性极强)
    function loadView(viewId) {
        const container = document.getElementById('dynamic-content');
        container.innerHTML = ''; // 清空

        if(viewId === 'dashboard') {
            container.innerHTML = `
                <div class="mb-10">
                    <h2 class="text-3xl font-black text-slate-800">下午好，您的资产仪表盘</h2>
                    <p class="text-slate-400 text-sm mt-1">当前有 2 个资产正在由 AI 专家进行交叉审核中</p>
                </div>
                <div class="grid grid-cols-3 gap-8 mb-10">
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                        <p class="text-[10px] text-slate-400 font-bold uppercase">本月评估总值 (期望)</p>
                        <p class="text-3xl font-black text-slate-800 mt-1">￥1,420.50万</p>
                    </div>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                        <p class="text-[10px] text-blue-600 font-bold uppercase">已锁定极限生存值</p>
                        <p class="text-3xl font-black text-blue-600 mt-1">￥480.00万</p>
                    </div>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                        <p class="text-[10px] text-green-500 font-bold uppercase">合规性一致率</p>
                        <p class="text-3xl font-black text-green-500 mt-1">94.8%</p>
                    </div>
                </div>
                <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="font-bold">近期评估任务</h3>
                        <button onclick="loadView('assess')" class="text-blue-600 font-bold text-sm">发起新评估 +</button>
                    </div>
                    <table class="w-full text-left text-sm">
                        <tr class="text-slate-400 border-b"><th class="pb-4">资产包</th><th class="pb-4">烈度 γ</th><th class="pb-4">状态</th><th class="pb-4">操作</th></tr>
                        <tr class="border-b hover:bg-slate-50">
                            <td class="py-5 font-bold">零售消费行为数据集-2026</td>
                            <td>1.8 (高)</td>
                            <td><span class="px-2 py-1 bg-green-100 text-green-700 rounded-md text-[10px] font-bold italic">评估完成</span></td>
                            <td><button onclick="renderFullReport()" class="text-blue-600 font-bold">查看三维报告</button></td>
                        </tr>
                    </table>
                </div>
            `;
        }

        if(viewId === 'assess') {
            container.innerHTML = `
                <div class="max-w-3xl mx-auto py-10 text-center">
                    <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-3xl flex items-center justify-center text-3xl mx-auto mb-6">🚀</div>
                    <h2 class="text-3xl font-black mb-4">准备好开启新的估值了吗？</h2>
                    <p class="text-slate-500 mb-10">数钥智评将采用对话式采集，协助您完成资产合规录入。</p>
                    <div class="bg-white p-10 rounded-3xl border-4 border-dashed border-blue-100 hover:border-blue-400 transition cursor-pointer" onclick="toggleAi(true)">
                        <p class="text-xl font-bold text-blue-600">点击唤起 AI 助手开始</p>
                        <p class="text-xs text-slate-400 mt-2">支持 PDF / Excel / 文案识别</p>
                    </div>
                </div>
            `;
            setTimeout(() => toggleAi(true), 400);
        }

        if(viewId === 'expertTasks') {
            container.innerHTML = `
                <h2 class="text-3xl font-black text-slate-800 mb-8">专家审核工作台</h2>
                <div class="bg-white p-8 rounded-3xl border-2 border-orange-100">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="px-2 py-1 bg-orange-100 text-orange-600 rounded text-[10px] font-bold mb-2 inline-block">加急 · 剩余 4h</span>
                            <h4 class="text-xl font-bold">某零售金融数据集极限值修正案</h4>
                            <p class="text-sm text-slate-400 mt-1">申请单位：大连商业银行 | AI 预审得分：88</p>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-black text-slate-800">￥850.00</p>
                            <p class="text-[10px] text-slate-400">预计审核报酬</p>
                            <button class="mt-4 bg-slate-900 text-white px-6 py-2 rounded-xl text-xs font-bold">开始人工复核</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        if(viewId === 'mall') {
            container.innerHTML = `
                <h2 class="text-2xl font-black mb-8">增值服务生态</h2>
                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-white p-8 rounded-3xl card-shadow border hover:border-blue-500 transition">
                        <div class="text-3xl mb-4">🛡️</div>
                        <h4 class="font-bold">数据资产评估保险</h4>
                        <p class="text-xs text-slate-400 mt-2 mb-6">联手众安保险，为评估结果提供风险担保。</p>
                        <button class="w-full py-3 bg-blue-50 text-blue-600 rounded-xl font-bold text-xs">查看详情</button>
                    </div>
                    <div class="bg-white p-8 rounded-3xl card-shadow border hover:border-blue-500 transition">
                        <div class="text-3xl mb-4">👨‍🏫</div>
                        <h4 class="font-bold">专家 1-on-1 连线</h4>
                        <p class="text-xs text-slate-400 mt-2 mb-6">针对复杂资产包，邀请行业领军人物深度拆解。</p>
                        <button class="w-full py-3 bg-blue-50 text-blue-600 rounded-xl font-bold text-xs">立即预约</button>
                    </div>
                </div>
            `;
        }
    }

    // 4. 报告详情页 (核心逻辑：三维估值)
    function renderFullReport() {
        const container = document.getElementById('dynamic-content');
        container.innerHTML = `
            <div class="flex justify-between items-end mb-8">
                <div>
                    <button onclick="loadView('dashboard')" class="text-blue-600 font-bold text-xs mb-2 block">← 返回仪表盘</button>
                    <h2 class="text-4xl font-black text-slate-900">资产价值报告：零售消费包</h2>
                </div>
                <button class="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold text-sm">下载 PDF 官方报告</button>
            </div>
            
            <div class="grid grid-cols-12 gap-8">
                <div class="col-span-8 bg-white p-10 rounded-[40px] shadow-sm border">
                    <h3 class="font-bold mb-10 flex items-center">📊 三维估值模型分布图</h3>
                    <div class="h-[350px]"><canvas id="reportChart"></canvas></div>
                    <div class="grid grid-cols-3 gap-6 mt-10">
                        <div class="p-6 bg-green-50 rounded-3xl text-center border border-green-100">
                            <p class="text-[10px] font-bold text-green-600">乐观价值 (Max)</p>
                            <p class="text-2xl font-black text-green-700">￥1,280.00万</p>
                        </div>
                        <div class="p-6 bg-blue-50 rounded-3xl text-center border border-blue-100">
                            <p class="text-[10px] font-bold text-blue-600">期望价值 (Exp)</p>
                            <p class="text-2xl font-black text-blue-700">￥950.40万</p>
                        </div>
                        <div class="p-6 bg-orange-50 rounded-3xl text-center border border-orange-100">
                            <p class="text-[10px] font-bold text-orange-600">极限生存值 (Min)</p>
                            <p class="text-2xl font-black text-orange-700 font-mono">￥420.00万</p>
                        </div>
                    </div>
                </div>
                
                <div class="col-span-4 space-y-6">
                    <div class="bg-slate-900 text-white p-8 rounded-[40px]">
                        <h4 class="font-bold mb-4">AI 专家共识意见</h4>
                        <div class="space-y-4">
                            <div class="flex items-start space-x-3">
                                <span class="text-green-400">●</span>
                                <p class="text-xs opacity-70 italic">“风控智能体：违约概率模型已在 γ=1.8 环境下完成压力测试，通过。”</p>
                            </div>
                            <div class="flex items-start space-x-3 border-t border-white/10 pt-4">
                                <span class="text-amber-400">●</span>
                                <p class="text-xs opacity-70 italic">“合规智能体：资产持有证明文件需在 48h 内补充原件扫描件，目前评级：B+。”</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-blue-600 text-white p-8 rounded-[40px] shadow-xl shadow-blue-200">
                        <h4 class="font-bold mb-2">需要专家人工加持？</h4>
                        <p class="text-xs opacity-80 mb-6">若对此评估有疑义，可申请“行业领军专家”进行二次修正。</p>
                        <button onclick="loadView('mall')" class="w-full py-4 bg-white text-blue-600 rounded-2xl font-bold text-sm">申请专家介入</button>
                    </div>
                </div>
            </div>
        `;
        initReportChart();
    }

    // 5. AI 对话助手逻辑 (重点实现)
    function toggleAi(show) {
        document.getElementById('ai-assistant').classList.toggle('hidden', !show);
    }

    function handleFileSubmit(e) {
        const file = e.target.files[0];
        if(file) {
            sendUserMessage(`📎 上传资产文件: ${file.name}`, 1);
            setTimeout(() => {
                sendAiMessage("✅ 文件解析成功！识别到该资产为“电商零售流水”。为了进一步计算，请问该资产的**更新频率**是？");
                updateAiStep(2);
                updateAiOptions(["实时同步", "按月更新", "离线存量"]);
            }, 1000);
        }
    }

    function handleTextSubmit() {
        const input = document.getElementById('chat-input');
        if(input.value) {
            sendUserMessage(input.value, 1);
            input.value = '';
            setTimeout(() => {
                sendAiMessage("了解。正在调用‘金融专家智能体’进行初步测算...");
            }, 800);
        }
    }

    function sendAiMessage(msg) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = "flex items-start space-x-2 animate__animated animate__fadeInUp";
        div.innerHTML = `<div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-xs">A</div>
                         <div class="chat-bubble-ai p-4 text-sm text-slate-700 leading-relaxed shadow-sm max-w-[85%]">${msg}</div>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function sendUserMessage(msg, s) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = "flex justify-end animate__animated animate__fadeInUp";
        div.innerHTML = `<div class="chat-bubble-user p-4 text-sm shadow-md max-w-[85%]">${msg}</div>`;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        if(step + s >= 5) {
            setTimeout(() => {
                sendAiMessage("🎉 信息采集已完成！模型正在构建中。您现在可以前往【报告中心】查看初步评估结果。");
                updateAiStep(5);
                setTimeout(() => { toggleAi(false); renderFullReport(); }, 2000);
            }, 1000);
        }
    }

    function updateAiStep(s) {
        step = s;
        document.getElementById('chat-progress-num').innerText = `${s}/5`;
        document.getElementById('chat-progress-bar').style.width = `${(s/5)*100}%`;
    }

    function updateAiOptions(opts) {
        const optBox = document.getElementById('ai-options');
        optBox.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = "px-4 py-2 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition shadow-sm";
            b.innerText = o;
            b.onclick = () => {
                sendUserMessage(o, 1);
                sendAiMessage(`已确认更新频率为：${o}。最后，该资产是否有来自第三方的审计报告？`);
                updateAiStep(step + 1);
                updateAiOptions(["有，已包含在附件", "无，需AI预审"]);
            };
            optBox.appendChild(b);
        });
    }

    function initReportChart() {
        const ctx = document.getElementById('reportChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['极限值', '期望值', '乐观值'],
                datasets: [{
                    data: [420, 950.4, 1280],
                    backgroundColor: ['#f97316', '#2563eb', '#22c55e'],
                    borderRadius: 20,
                    barThickness: 60
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { color: '#f1f5f9' }, border: { display: false } },
                    x: { grid: { display: false }, border: { display: false } }
                }
            }
        });
    }

</script>

</body>
</html>
